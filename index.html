<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChiquiTube</title>

<style>
body {
    margin: 0;
    font-family: 'Comic Sans MS', cursive;
    background: linear-gradient(135deg, #ffeb3b, #ff80ab);
}

/* HEADER */
header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #ff4081;
    padding: 10px 20px;
    color: white;
}

.logo {
    font-size: 28px;
    font-weight: bold;
}

.search {
    padding: 8px;
    border-radius: 20px;
    border: none;
    width: 200px;
}

/* MENÚ */
.menu {
    display: flex;
    gap: 15px;
    padding: 10px;
    overflow-x: auto;
}

.menu button {
    background: #00e5ff;
    border: none;
    padding: 10px 15px;
    border-radius: 20px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.menu button:hover {
    transform: scale(1.1);
    background: #00bcd4;
}

/* GRID DE VIDEOS */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 6px 10px rgba(0,0,0,0.2);
    transition: transform 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card iframe {
    width: 100%;
    height: 150px;
    border: none;
}

.title {
    padding: 10px;
    font-size: 14px;
    font-weight: bold;
}

/* ANIMACIÓN */
@keyframes bounce {
    0% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
    100% { transform: translateY(0); }
}

.logo {
    animation: bounce 1s infinite;
}
</style>

</head>

<body>

<header>
    <div class="logo">ChiquiTube</div>
    <input class="search" placeholder="Buscar videos...">
</header>

<div class="menu">
    <button> masha</button>
    <button>🎵 Música</button>
    <button>📚 Educación</button>
    <button>😂 Diversión</button>
    <button>🐶 Animales</button>
</div>

<div class="grid">
    <div class="card">
        <"embed src="https://youtu.be/D6-o6eZ-VXI?si=tqrbaNfIvgNJX77d"></iframe>
        <div class="title">Video divertido 1</div>
    </div>

    <div class="card">
        <iframe src="https://www.youtube.com/embed/tgbNymZ7vqY"></iframe>
        <div class="title">Video divertido 2</div>
    </div>

    <div class="card">
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
        <div class="title">Video divertido 3</div>
    </div>

    <div class="card">
        <iframe src="https://www.youtube.com/embed/9bZkp7q19f0"></iframe>
        <div class="title">Video divertido 4</div>
    </div>

<iframe width="100%" height="200"
src=https://www.youtube.com/watch?v=OnfAzdmtp-8
title="YouTube video"
frameborder="0"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
allowfullscreen>
</iframe>
</div>

<script>
// Simulación de búsqueda simple
document.querySelector(".search").addEventListener("input", function(e) {
    let texto = e.target.value.toLowerCase();
    document.querySelectorAll(".title").forEach(t => {
        t.parentElement.style.display =
            t.innerText.toLowerCase().includes(texto) ? "block" : "none";
    });
});
</script>

</body>
</html>
