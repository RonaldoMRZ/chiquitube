<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChiquiTube</title>

<style>
body {
    margin: 0;
    font-family: 'Comic Sans MS', cursive;
    background: linear-gradient(135deg, #ffeb3b, #ff80ab);
}

/* HEADER */
header {
    background: #ff4081;
    color: white;
    text-align: center;
    padding: 15px;
    font-size: 28px;
    font-weight: bold;
    animation: bounce 1s infinite;
}

/* MENÚ */
.menu {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 10px;
}

.menu button {
    background: #00e5ff;
    border: none;
    padding: 12px;
    border-radius: 25px;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

.menu button:hover {
    transform: scale(1.1);
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 6px 10px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card iframe {
    width: 100%;
    height: 150px;
    border: none;
}

.title {
    padding: 10px;
    font-weight: bold;
}

/* ANIMACIÓN */
@keyframes bounce {
    0% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
    100% { transform: translateY(0); }
}
</style>
</head>

<body>

<header>ChiquiTube</header>

<div class="menu">
    <button onclick="mostrarSeccion('videos')">🏠 Inicio</button>
    <button onclick="mostrarSeccion('musica')">🎵 Música</button>
    <button onclick="mostrarSeccion('juegos')">🎮 Juegos</button>
    <button onclick="mostrarSeccion('educacion')">📚 Educación</button>
</div>

<!-- INICIO -->
<div id="videos" class="grid">
    <div class="card">
        <iframe src="https://res.cloudinary.com/dges4kys2/video/upload/v1774159924/videoplayback_1_oj3qhj.mp4"></iframe>
        <div class="title">Video divertido</div>
    </div>
</div>

<!-- MUSICA -->
<div id="musica" class="grid" style="display:none;">
    <div class="card">
        <iframe src="https://www.youtube.com/embed/kJQP7kiw5Fk"></iframe>
        <div class="title">Despacito</div>
    </div>

    <div class="card">
        <iframe src="https://www.youtube.com/embed/3JZ_D3ELwOQ"></iframe>
        <div class="title">Counting Stars</div>
    </div>

    <div class="card">
        <iframe src="https://www.youtube.com/embed/2Vv-BfVoq4g"></iframe>
        <div class="title">Perfect</div>
    </div>
</div>

<!-- JUEGOS -->
<div id="juegos" class="grid" style="display:none;">
    <div class="card">
        <iframe src="https://www.youtube.com/embed/tgbNymZ7vqY"></iframe>
        <div class="title">Juego divertido</div>
    </div>
</div>

<!-- EDUCACION -->
<div id="educacion" class="grid" style="display:none;">
    <div class="card">
        <iframe src="https://www.youtube.com/embed/ysz5S6PUM-U"></iframe>
        <div class="title">Aprender es divertido</div>
    </div>
</div>

<script>
function mostrarSeccion(seccion) {
    const secciones = ["videos", "musica", "juegos", "educacion"];

    secciones.forEach(id => {
        document.getElementById(id).style.display = "none";
    });

    document.getElementById(seccion).style.display = "grid";
}
</script>

</body>
</html>
